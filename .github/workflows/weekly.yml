name: Weekly AI GitHub Trending

on:
  schedule:
    # Every Monday at 01:00 UTC == 09:00 Singapore time (SGT, UTC+8).
    - cron: "0 1 * * 1"
  workflow_dispatch: {}   # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write   # commit the generated report back to the repo
  pages: write      # publish the latest report to GitHub Pages
  id-token: write

concurrency:
  group: ai-trending
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate weekly report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT_URL: https://danielljr9-hue.github.io/AI-repo-trending-automation/
        run: python scan.py

      - name: Report date
        id: meta
        run: echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Email the report
        continue-on-error: true   # never let email trouble block the web report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "AI GitHub Trending — ${{ steps.meta.outputs.today }}"
          to: danielljr9@gmail.com
          from: AI GitHub Trending <${{ secrets.MAIL_USERNAME }}>
          html_body: file://email_report.html

      - name: Commit report archive
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ docs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: weekly AI trending report $(date -u +%Y-%m-%d)"
            # Rebase onto any newer commits (e.g. a re-run) so the push can't collide.
            git pull --rebase -X ours origin main || true
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
